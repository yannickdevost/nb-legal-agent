name: NB Legal Agent - Weekly Criminal Law Digest

on:
  schedule:
    - cron: '0 12 * * 5'   # Every Friday at 12:00 UTC = 8:00 AM Atlantic Daylight Time
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # Give the workflow write permission to commit back to the repository
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests anthropic pypdf

      - name: Run NB Legal Agent
        env:
          CANLII_API_KEY:    ${{ secrets.CANLII_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER:      ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER:    ${{ secrets.EMAIL_RECEIVER }}
        run: python nb_legal_agent.py

      - name: Save agent state back to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agent_state.json
          git diff --staged --quiet || git commit -m "Update agent state [skip ci]"
          git push
