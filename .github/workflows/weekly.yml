name: NB Legal Agent - Weekly Criminal Law Digest

on:
  schedule:
    - cron: '0 12 * * 5'   # Every Friday at 12:00 UTC = 8:00 AM Atlantic Daylight Time
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests anthropic pypdf

      - name: Restore agent state
        uses: actions/cache@v4
        with:
          path: agent_state.json
          key: agent-state-${{ github.run_id }}
          restore-keys: |
            agent-state-

      - name: Run NB Legal Agent
        env:
          CANLII_API_KEY:    ${{ secrets.CANLII_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER:      ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER:    ${{ secrets.EMAIL_RECEIVER }}
        run: python nb_legal_agent.py

      - name: Save agent state
        uses: actions/cache@v4
        with:
          path: agent_state.json
          key: agent-state-${{ github.run_id }}
